name: FinanceWise AI CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest httpx
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
        pip install slowapi networkx
    - name: Run PyTest
      run: |
        cd backend
        python -m pytest

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
    - name: Install Dependencies & Lint
      run: |
        cd frontend
        npm install
        npm run lint
    - name: Build
      run: |
        cd frontend
        npm run build

  deploy:
    needs: [test-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Deployment Simulation
      run: echo "Tests passed. Ready to trigger DigitalOcean or AWS deployment via Docker Compose."
