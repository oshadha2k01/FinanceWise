name: FinanceWise AI CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")' || exit 1"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      MONGODB_URL: mongodb://localhost:27017
    steps:
      - uses: actions/checkout@v4
      - name: Wait for MongoDB service
        run: |
          for i in {1..30}; do
            if (echo > /dev/tcp/127.0.0.1/27017) >/dev/null 2>&1; then
              echo "mongo: ready"
              exit 0
            fi
            sleep 1
          done
          echo "MongoDB did not become ready in time"
          exit 1
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; else pip install fastapi uvicorn motor pymongo python-dotenv bcrypt PyJWT slowapi networkx google-genai pytest httpx; fi
      - name: Run PyTest
        run: |
          cd backend
          python -m pytest

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Node / NPM diagnostics
        run: |
          node --version
          npm --version
          pwd
          ls -la
      - name: Install & Build
        env:
          VITE_API_URL: http://localhost:8000
          VITE_FIREBASE_API_KEY: dummy
          VITE_FIREBASE_AUTH_DOMAIN: dummy
          VITE_FIREBASE_PROJECT_ID: dummy
          VITE_FIREBASE_STORAGE_BUCKET: dummy
          VITE_FIREBASE_MESSAGING_SENDER_ID: dummy
          VITE_FIREBASE_APP_ID: dummy
          # If you set a real GEMINI_API_KEY in repo secrets, uncomment below
          # GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd frontend
          npm ci --no-audit --silent
          npm run build --if-present --loglevel verbose

  deploy:
    needs: [test-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deployment Simulation
        run: echo "Tests passed. Ready to trigger DigitalOcean or AWS deployment via Docker Compose."
